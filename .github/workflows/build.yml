name: Build APK

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout代码
      uses: actions/checkout@v4

    - name: 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 授予gradlew执行权限
      run: chmod +x gradlew

    - name: 构建Release APK
      run: |
        ./gradlew assembleRelease --stacktrace

    - name: 签名APK
      run: |
        echo "创建调试签名"
        keytool -genkeypair \
          -alias androiddebugkey \
          -keystore debug.keystore \
          -storepass android \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: 复制APK
      run: |
        mkdir -p output
        cp app/build/outputs/apk/release/app-release.apk output/CardCounter_v1.0.apk

    - name: 上传APK
      uses: actions/upload-artifact@v4
      with:
        name: CardCounter-APK
        path: output/CardCounter_v1.0.apk
        retention-days: 90

    - name: 创建Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: output/CardCounter_v1.0.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
